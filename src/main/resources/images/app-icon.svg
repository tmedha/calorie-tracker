<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="basketWood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c98a4b"/>
      <stop offset="100%" stop-color="#a5672f"/>
    </linearGradient>
    <radialGradient id="appleShine" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ff8a8a"/>
      <stop offset="100%" stop-color="#e0293f"/>
    </radialGradient>
    <radialGradient id="orangeShine" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffc36b"/>
      <stop offset="100%" stop-color="#f5911e"/>
    </radialGradient>
    <radialGradient id="grapeShine" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
  </defs>

  <!-- app-icon rounded background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#ffffff" opacity="0.03"/>

  <!-- soft ground shadow -->
  <ellipse cx="256" cy="410" rx="150" ry="20" fill="#0b1e4d" opacity="0.18"/>

  <!-- fruits peeking out of the basket (drawn first so basket rim overlaps their bottoms) -->
  <!-- grapes, left -->
  <g>
    <circle cx="176" cy="230" r="20" fill="url(#grapeShine)"/>
    <circle cx="198" cy="215" r="20" fill="url(#grapeShine)"/>
    <circle cx="196" cy="250" r="20" fill="url(#grapeShine)"/>
    <circle cx="220" cy="235" r="20" fill="url(#grapeShine)"/>
    <path d="M198 195 Q205 178 222 176" stroke="#3f7d3a" stroke-width="6" fill="none" stroke-linecap="round"/>
    <ellipse cx="223" cy="174" rx="12" ry="7" fill="#4CAF50" transform="rotate(-25 223 174)"/>
  </g>

  <!-- orange, right -->
  <g>
    <circle cx="336" cy="222" r="38" fill="url(#orangeShine)"/>
    <path d="M336 184 q-6 -14 6 -20" stroke="#3f7d3a" stroke-width="6" fill="none" stroke-linecap="round"/>
    <ellipse cx="345" cy="163" rx="13" ry="8" fill="#4CAF50" transform="rotate(20 345 163)"/>
    <g stroke="#e8790a" stroke-width="2.5" opacity="0.55">
      <path d="M310 205 q26 -14 52 0" fill="none"/>
      <path d="M308 226 q28 -6 56 0" fill="none"/>
      <path d="M312 246 q26 12 50 2" fill="none"/>
    </g>
  </g>

  <!-- apple, center (the star of the basket) -->
  <g>
    <path d="M256 168
             c-30 -22 -70 4 -66 40
             c3 30 30 62 66 78
             c36 -16 63 -48 66 -78
             c4 -36 -36 -62 -66 -40 z"
          fill="url(#appleShine)"/>
    <ellipse cx="234" cy="200" rx="12" ry="18" fill="#ffffff" opacity="0.35" transform="rotate(-18 234 200)"/>
    <path d="M256 172 q-4 -22 -18 -30" stroke="#7a4a20" stroke-width="7" fill="none" stroke-linecap="round"/>
    <ellipse cx="270" cy="140" rx="15" ry="9" fill="#4CAF50" transform="rotate(-30 270 140)"/>
  </g>

  <!-- basket -->
  <g>
    <path d="M138 262
             L374 262
             L352 384
             a20 20 0 0 1 -20 17
             L180 401
             a20 20 0 0 1 -20 -17
             Z"
          fill="url(#basketWood)"/>
    <!-- woven texture -->
    <g stroke="#8a5525" stroke-width="5" opacity="0.55" stroke-linecap="round">
      <path d="M148 284 L364 284"/>
      <path d="M154 308 L358 308"/>
      <path d="M160 332 L351 332"/>
      <path d="M167 356 L343 356"/>
      <path d="M175 380 L334 380"/>
    </g>
    <g stroke="#8a5525" stroke-width="5" opacity="0.4" stroke-linecap="round">
      <path d="M172 262 L152 396"/>
      <path d="M212 262 L200 400"/>
      <path d="M256 262 L256 402"/>
      <path d="M300 262 L312 400"/>
      <path d="M340 262 L360 396"/>
    </g>
    <!-- basket rim -->
    <path d="M130 250 a128 24 0 1 0 256 0 a128 24 0 1 0 -256 0 z"
          fill="#b5793d" stroke="#8a5525" stroke-width="5"/>
    <ellipse cx="256" cy="250" rx="128" ry="24" fill="none" stroke="#734117" stroke-width="3" opacity="0.4"/>
  </g>

  <!-- tape measure wrapping the basket like a ribbon -->
  <g>
    <!-- back strap (behind basket, peeking on the left) -->
    <path d="M148 270 C 118 300, 118 350, 158 392"
          fill="none" stroke="#fbbf24" stroke-width="34" stroke-linecap="round"/>
    <path d="M148 270 C 118 300, 118 350, 158 392"
          fill="none" stroke="#111827" stroke-width="34" stroke-linecap="round" stroke-dasharray="1 15" opacity="0.35"/>

    <!-- front strap, diagonal wrap across the basket -->
    <path d="M160 258 C 220 300, 300 330, 372 300"
          fill="none" stroke="#fbbf24" stroke-width="34" stroke-linecap="round"/>
    <path d="M160 258 C 220 300, 300 330, 372 300"
          fill="none" stroke="#111827" stroke-width="2.5" stroke-dasharray="1 13.5" stroke-linecap="round" opacity="0.75"/>
    <text x="205" y="298" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#3f2c00" opacity="0.8" transform="rotate(18 205 298)">10</text>
    <text x="255" y="316" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#3f2c00" opacity="0.8" transform="rotate(10 255 316)">20</text>
    <text x="308" y="322" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#3f2c00" opacity="0.8" transform="rotate(-6 308 322)">30</text>

    <!-- metal tip + coiled tail, cute curled flourish -->
    <path d="M372 300 C 400 292, 414 270, 400 250"
          fill="none" stroke="#fbbf24" stroke-width="30" stroke-linecap="round"/>
    <rect x="392" y="234" width="34" height="44" rx="8"
          fill="#cbd5e1" stroke="#94a3b8" stroke-width="3" transform="rotate(18 409 256)"/>
    <circle cx="409" cy="256" r="6" fill="#64748b" transform="rotate(18 409 256)"/>
  </g>

  <!-- cute face on the apple -->
  <g>
    <circle cx="238" cy="222" r="5.5" fill="#3a1a10"/>
    <circle cx="270" cy="222" r="5.5" fill="#3a1a10"/>
    <path d="M242 236 q12 10 24 0" stroke="#3a1a10" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="228" cy="232" r="7" fill="#ff6b81" opacity="0.55"/>
    <circle cx="282" cy="232" r="7" fill="#ff6b81" opacity="0.55"/>
  </g>
</svg>
